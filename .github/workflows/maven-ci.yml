name: Java CI with Maven

# 1. Sự kiện kích hoạt (Trigger)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 2. Runner (Máy chủ thực thi)
    runs-on: ubuntu-latest

    steps:
      # 3. Step: Checkout code từ GitHub về máy ảo
      - uses: actions/checkout@v4

      # 4. Step: Cài đặt JDK (Java Development Kit)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Sửa từ 17 thành 25
          distribution: 'oracle' # Hoặc 'temurin' nếu bản phân phối đó đã hỗ trợ 25
          cache: maven

      # 5. Step: Chạy Maven Build (bao gồm test và package)
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # 6. Step: Triển khai action upload-artifact để lưu file .jar
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar
          path: target/*.jar